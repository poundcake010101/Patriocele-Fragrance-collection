<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Patriocele Fragrance Collection</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">Patriocele Fragrance Collection</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="products.html">Perfumes</a>
            <a href="cart.html">Cart (<span id="cart-count">0</span>)</a>
            <div id="auth-buttons">
                <a href="login.html" class="btn-outline">Login</a>
                <a href="signup.html" class="btn-primary">Sign Up</a>
            </div>
            <div id="user-menu" style="display: none;">
                <span id="user-email"></span>
                <a href="orders.html">Orders</a>
                <a href="profile.html">Profile</a>
                <a href="admin.html" id="admin-link" style="display: none;">Admin Panel</a>
                <button id="logout-btn" class="btn-outline">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div style="margin-bottom: 2.5rem;">
            <div class="page-eyebrow">Account</div>
            <h1 class="page-title">My Orders</h1>
            <div class="gold-rule"></div>
        </div>

        <div id="orders-list">
            <!-- Orders loaded by JS -->
        </div>

        <div id="no-orders" style="display: none; text-align: center; padding: 5rem 2rem; border: 1px dashed var(--border); border-radius: 4px; background: var(--white);">
            <div style="font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 300; color: var(--text-mid); margin-bottom: 1rem;">No orders yet</div>
            <p style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 2rem; letter-spacing: 0.05em;">Your fragrance journey starts with your first purchase.</p>
            <a href="products.html" class="btn-primary">Start Shopping</a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
</body>
</html>
